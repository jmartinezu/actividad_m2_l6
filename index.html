<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad jQuery - Lección 6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .texto-lista { color: blue; } /* Clase que usaremos con jQuery */
    </style>
</head>
<body class="container mt-5">

    <h2>Lista de Tareas</h2>
    <ul id="miLista">
        <li>Aprender HTML</li>
        <li>Estudiar CSS</li>
        <li>Dominar JS</li>
    </ul>

    <button id="btnToggle" class="btn btn-primary mt-3">Ocultar lista</button>

    <hr>
    <h3>Mi Tooltip (Plugin)</h3>
    <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="top" title="¡Soy un Tooltip funcionando!">
        Pasa el ratón por aquí
    </button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function() {
            // 3. Manipulación del DOM
            // Cambiar color de texto (usando CSS directo)
            $('#miLista li').css('color', 'red');
            // Agregar dinámicamente un cuarto elemento
            $('#miLista').append('<li>Dominar jQuery 🚀</li>');

            // 4. Eventos en jQuery
            $('#btnToggle').click(function() {
                $('#miLista').toggle(); // Oculta o muestra
                
                // Cambiar el texto del botón según el estado
                if ($('#miLista').is(':visible')) {
                    $(this).text('Ocultar lista');
                } else {
                    $(this).text('Mostrar lista');
                }
            });

            // 5. Uso de plugins (Tooltip de Bootstrap)
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            });
        });
    </script>
</body>
</html>
